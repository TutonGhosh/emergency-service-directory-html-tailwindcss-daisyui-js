<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emergency Service Directory</title>
    <link rel="stylesheet" href="styles/style.css">
    <link rel="shortcut icon" href="assets/logo.png" type="image/x-icon">
    <!-- DaisyUI & TailwindCSS CDS -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="font-outfit">
    <header class="max-w-[1800px] mx-auto p-5">
        <!-- Navbar -->
        <section>
            <nav class="flex flex-col items-center gap-5 md:flex-row md:justify-between">
                <div class="flex items-center gap-3">
                    <img class="h-14" src="assets/logo.png" alt="">
                    <h1 class="text-xl text-[#006747] font-bold">Emergency Service <br> Directory</h1>
                </div>
                <div class="flex items-center gap-5">
                    <button class="flex items-center justify-center gap-3 bg-[#41FF6B4D] rounded-3xl p-2 px-6">
                        <span class="text-lg font-bold">0</span>
                        <img class="h-7" src="assets/heart.png" alt="">
                    </button>
                    <button class="flex items-center justify-center gap-3 bg-[#41FF6B4D] rounded-3xl p-2 px-6">
                        <span class="text-lg font-bold">0</span>
                        <img class="h-7" src="assets/coin.png" alt="">
                    </button>
                    <button class="flex items-center justify-center gap-3 bg-[#01b142] rounded-3xl p-2 px-6">
                        <span class="text-lg font-bold text-white">0</span>
                        <h1 class="text-lg font-bold text-white">copy</h1>
                    </button>
                </div>
            </nav>
        </section>
    </header>

    <main>
        <!-- Banner -->
        <section>
            <div class="bg-gradient-to-r from-[#0a3d2e] via-[#1a5c40] to-[#0a3d2e] w-full">
                <div class="flex flex-col items-center p-10 space-y-5 text-center text-[#FFFFFF]">
                    <img class="h-28" src="assets/logo-dark.png" alt="">
                    <h1 class="text-4xl font-bold">Emergency Service Directory</h1>
                    <p class="text-lg font-medium">Government Emergency Services at Your Fingertip – A Project by Government of the People’s Republic of Bangladesh
                    </p>
                </div>
            </div>
        </section>
    </main>

    <script src="js/script.js"></script>
</body>
</html>
